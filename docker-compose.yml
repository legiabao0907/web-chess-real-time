services:
  postgres:
    image: postgres:17.4
    container_name: chess_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: testnest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chess-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testnest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: chess_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass chessredis2024
    volumes:
      - redis_data:/data
    networks:
      - chess-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "chessredis2024", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:admin@postgres:5432/testnest
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=chessredis2024
      - JWT_ACCESS_SECRET=obsidian_ultra_access_secret_key_change_in_prod
      - JWT_REFRESH_SECRET=obsidian_ultra_refresh_secret_key_change_in_prod
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3000
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chess-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    container_name: chess_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - chess-network

volumes:
  postgres_data:
  redis_data:

networks:
  chess-network:
    driver: bridge
